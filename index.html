<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic OCR · Searchable PDF</title>
<style>
  :root{
    --ink:#1e293b;--muted:#64748b;--faint:#94a3b8;
    --brand:#6366f1;--brand-2:#8b5cf6;--brand-ink:#eef2ff;
    --accent:#06b6d4;--ok:#10b981;--err:#e11d48;
    --line:rgba(15,23,42,.08);
    --glass:rgba(255,255,255,.55);
    --glass-2:rgba(255,255,255,.42);
    --glass-brd:rgba(255,255,255,.75);
    --ring:rgba(99,102,241,.35);
    --shadow:0 14px 44px -18px rgba(30,41,59,.35);
    --radius:20px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
    color:var(--ink);
    background:
      radial-gradient(900px 520px at 6% -5%,rgba(139,92,246,.22),transparent 60%),
      radial-gradient(820px 520px at 104% 6%,rgba(6,182,212,.20),transparent 55%),
      radial-gradient(760px 620px at 50% 118%,rgba(99,102,241,.20),transparent 60%),
      linear-gradient(180deg,#eef2ff,#f6f8ff 42%,#eef6ff);
    background-attachment:fixed;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  header{max-width:1200px;margin:0 auto;padding:34px 24px 10px;}
  .brand{display:flex;align-items:center;gap:14px;}
  .logo{
    width:46px;height:46px;border-radius:14px;flex:none;
    background:linear-gradient(135deg,var(--brand),var(--brand-2));
    display:grid;place-items:center;color:#fff;font-weight:800;font-size:20px;
    box-shadow:0 10px 26px -8px var(--ring);
  }
  header h1{font-size:22px;font-weight:700;letter-spacing:-.02em;color:#0f172a;}
  header .tag{color:var(--muted);font-size:13px;margin-top:3px;}
  .pill{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;color:var(--brand);
    background:var(--glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:1px solid var(--glass-brd);padding:5px 12px;border-radius:999px;margin-left:auto;
    box-shadow:0 6px 18px -10px rgba(30,41,59,.30);}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 3px rgba(16,185,129,.18);}

  .wrap{max-width:1200px;margin:0 auto;padding:22px 24px 64px;}

  .card{
    background:var(--glass);
    backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);
    border:1px solid var(--glass-brd);border-radius:var(--radius);
    box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.65);
    overflow:hidden;
  }

  /* Upload */
  .drop{
    position:relative;padding:46px 28px;text-align:center;cursor:pointer;display:block;
    border:2px dashed rgba(99,102,241,.35);border-radius:16px;margin:18px;
    transition:border-color .2s,background .2s,transform .2s;
    background:radial-gradient(520px 200px at 50% -10%,rgba(99,102,241,.08),transparent 70%);
  }
  .drop:hover{border-color:var(--brand);background:rgba(99,102,241,.06);}
  .drop.drag{border-color:var(--brand);background:rgba(99,102,241,.12);transform:scale(1.006);}
  .drop input{display:none;}
  .up-ico{
    width:64px;height:64px;margin:0 auto 16px;border-radius:18px;
    background:linear-gradient(135deg,rgba(99,102,241,.16),rgba(6,182,212,.16));
    display:grid;place-items:center;color:var(--brand);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.6);
  }
  .up-ico svg{width:30px;height:30px;}
  .drop h3{font-size:17px;font-weight:600;color:#0f172a;}
  .drop p{color:var(--muted);font-size:13.5px;margin-top:5px;}
  .drop .hint{color:var(--faint);font-size:12px;margin-top:12px;}

  .filebar{
    display:none;align-items:center;gap:12px;margin:0 18px 18px;padding:12px 16px;
    background:var(--glass-2);border:1px solid var(--glass-brd);border-radius:14px;
  }
  .filebar.show{display:flex;}
  .filebar .fico{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#fb7185,#e11d48);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:700;flex:none;}
  .filebar .fmeta{min-width:0;}
  .filebar .fname{font-weight:600;font-size:14px;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .filebar .fsize{color:var(--muted);font-size:12px;}
  .filebar .clear{margin-left:auto;background:none;border:none;color:var(--faint);cursor:pointer;font-size:22px;line-height:1;padding:4px;transition:color .15s;}
  .filebar .clear:hover{color:var(--err);}

  .actions{display:flex;justify-content:center;padding:0 18px 24px;}
  .btn{
    display:inline-flex;align-items:center;gap:9px;
    background:linear-gradient(135deg,var(--brand),var(--brand-2));color:#fff;
    border:none;padding:13px 32px;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;
    box-shadow:0 12px 26px -10px var(--ring);transition:transform .15s,box-shadow .15s,opacity .2s;
  }
  .btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 18px 34px -12px var(--ring);}
  .btn:active:not(:disabled){transform:translateY(0);}
  .btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none;}
  .btn svg{width:18px;height:18px;}

  /* Status / error */
  .status,.err{display:none;margin:18px 0;}
  .status.show{display:block;}
  .status{text-align:center;background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--glass-brd);border-radius:16px;padding:20px 22px;box-shadow:var(--shadow);}
  .status .bar{max-width:520px;margin:4px auto 12px;height:9px;border-radius:999px;background:rgba(15,23,42,.08);overflow:hidden;}
  .status .bar span{display:block;height:100%;width:0;border-radius:999px;
    background:linear-gradient(90deg,var(--brand),var(--accent));transition:width .35s ease;
    box-shadow:0 0 12px rgba(99,102,241,.5);}
  .status .bar.indet span{width:35%;animation:slide 1.15s ease-in-out infinite;transition:none;}
  @keyframes slide{0%{margin-left:-35%;}100%{margin-left:100%;}}
  .stat{max-width:520px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;
    color:var(--muted);font-size:13.5px;gap:12px;}
  .mono{font-variant-numeric:tabular-nums;font-weight:700;color:var(--brand);
    background:rgba(99,102,241,.10);border:1px solid rgba(99,102,241,.20);padding:3px 12px;border-radius:999px;}
  .err{max-width:680px;margin:18px auto;background:rgba(254,242,242,.85);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:1px solid #fecdd3;color:#be123c;padding:14px 16px;border-radius:14px;font-size:14px;}
  .err.show{display:flex;gap:10px;align-items:flex-start;}

  /* Activity log console */
  .logwrap{display:none;margin:14px 0 0;
    background:var(--glass);backdrop-filter:blur(16px) saturate(160%);-webkit-backdrop-filter:blur(16px) saturate(160%);
    border:1px solid var(--glass-brd);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);}
  .logwrap.show{display:block;}
  .loghead{display:flex;align-items:center;gap:9px;padding:11px 16px;cursor:pointer;user-select:none;
    color:#0f172a;font-size:13px;font-weight:600;border-bottom:1px solid var(--line);}
  .loghead .dotg{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 3px rgba(16,185,129,.18);flex:none;}
  .loghead .lcount{margin-left:auto;color:var(--faint);font-weight:600;font-variant-numeric:tabular-nums;}
  .loghead .chev{transition:transform .2s;color:var(--faint);flex:none;}
  .logwrap.collapsed .chev{transform:rotate(-90deg);}
  .logwrap.collapsed .logbody{display:none;}
  .logbody{max-height:240px;overflow:auto;padding:8px 0;background:rgba(255,255,255,.35);
    font-family:ui-monospace,"SF Mono","Cascadia Code",Consolas,monospace;font-size:12px;line-height:1.7;}
  .logrow{display:flex;gap:10px;padding:2px 16px;white-space:pre-wrap;word-break:break-word;}
  .logrow .lt{color:var(--faint);flex:none;font-variant-numeric:tabular-nums;}
  .logrow .lm{color:#334155;}
  .logrow.error{background:rgba(225,29,72,.08);}
  .logrow.error .lm{color:#be123c;font-weight:600;}
  .logrow.warn .lm{color:#b45309;}
  .logrow.done .lm{color:#047857;font-weight:600;}

  /* Results */
  .grid{display:none;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px;}
  .grid.show{display:grid;}
  @media(max-width:920px){.grid{grid-template-columns:1fr;}}
  .panel{display:flex;flex-direction:column;min-height:0;}
  .phead{display:flex;align-items:center;gap:11px;padding:16px 20px;border-bottom:1px solid var(--line);}
  .phead .pic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;color:#fff;flex:none;box-shadow:0 6px 16px -8px rgba(30,41,59,.4);}
  .phead .pic.a{background:linear-gradient(135deg,#6366f1,#8b5cf6);}
  .phead .pic.b{background:linear-gradient(135deg,#0891b2,#06b6d4);}
  .phead h2{font-size:15px;font-weight:600;color:#0f172a;}
  .phead .cnt{margin-left:auto;font-size:12px;color:var(--brand);background:rgba(99,102,241,.10);border:1px solid rgba(99,102,241,.18);padding:4px 11px;border-radius:999px;font-weight:600;}

  .ocr-body{padding:16px 18px;max-height:68vh;overflow:auto;}
  .page-block{margin-bottom:20px;}
  .page-block:last-child{margin-bottom:0;}
  .page-label{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--faint);font-weight:700;margin-bottom:8px;}
  .page-label::after{content:"";flex:1;height:1px;background:var(--line);}
  .line{padding:9px 13px;border-radius:11px;margin-bottom:6px;font-size:15px;line-height:1.85;
    background:rgba(255,255,255,.55);border:1px solid var(--glass-brd);
    direction:rtl;text-align:right;font-family:"Amiri","Segoe UI",serif;transition:background .15s,border-color .15s;}
  .line:hover{background:rgba(99,102,241,.08);border-color:rgba(99,102,241,.30);}

  iframe{width:100%;height:68vh;border:none;background:#fff;}
  .dl{display:flex;align-items:center;justify-content:center;gap:9px;padding:15px;
    background:rgba(255,255,255,.5);color:var(--brand);text-decoration:none;font-weight:600;font-size:14px;
    border-top:1px solid var(--line);transition:background .15s;}
  .dl:hover{background:rgba(99,102,241,.10);}
  .dl svg{width:17px;height:17px;}

  .empty{color:var(--faint);text-align:center;padding:40px 20px;font-size:14px;}

  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:rgba(99,102,241,.30);border-radius:999px;border:2px solid transparent;background-clip:content-box;}
  ::-webkit-scrollbar-thumb:hover{background:rgba(99,102,241,.5);background-clip:content-box;}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="logo">ع</div>
    <div>
      <h1>Arabic OCR &middot; Searchable PDF</h1>
      <div class="tag">Extract text from scanned PDFs and generate a fully searchable copy</div>
    </div>
    <span class="pill"><span class="dot"></span> dots.ocr</span>
  </div>
</header>

<div class="wrap">
  <div class="card">
    <label class="drop" id="drop" for="file">
      <input type="file" id="file" accept="application/pdf">
      <div class="up-ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M12 3v13"/><path d="m7 8 5-5 5 5"/>
        </svg>
      </div>
      <h3>Drop your PDF here, or click to browse</h3>
      <p>The document is processed page by page and rebuilt with a searchable text layer</p>
      <div class="hint">PDF files only</div>
    </label>

    <div class="filebar" id="filebar">
      <div class="fico">PDF</div>
      <div class="fmeta">
        <div class="fname" id="fname"></div>
        <div class="fsize" id="fsize"></div>
      </div>
      <button class="clear" id="clear" title="Remove" type="button">&times;</button>
    </div>

    <div class="actions">
      <button class="btn" id="go" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 3v4M3 5h4M6 17v4m-2-2h4"/><path d="M13 3 8.5 8.5a2 2 0 0 0 0 3L15 18l3-3-6.5-6.5a2 2 0 0 0-3 0"/>
          <path d="m14 7 3 3"/>
        </svg>
        Process PDF
      </button>
    </div>
  </div>

  <div class="status" id="status">
    <div class="bar" id="bar"><span id="barfill"></span></div>
    <div class="stat">
      <span id="statMsg">Starting…</span>
      <span id="statTime" class="mono">0.0s</span>
    </div>
  </div>

  <div class="err" id="err">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;margin-top:1px">
      <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
    </svg>
    <span id="errmsg"></span>
  </div>

  <div class="logwrap" id="logwrap">
    <div class="loghead" id="loghead">
      <span class="dotg" id="logdot"></span>
      <span>Activity log</span>
      <span class="lcount" id="logcount">0</span>
      <svg class="chev" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
    </div>
    <div class="logbody" id="logbody"></div>
  </div>

  <div class="grid" id="result">
    <div class="card panel">
      <div class="phead">
        <div class="pic a">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
        </div>
        <h2>Extracted Text</h2>
        <span class="cnt" id="pageCount"></span>
      </div>
      <div class="ocr-body" id="ocrText"></div>
    </div>

    <div class="card panel">
      <div class="phead">
        <div class="pic b">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><circle cx="11.5" cy="14.5" r="2.5"/><path d="m13.3 16.3 2.2 2.2"/></svg>
        </div>
        <h2>Searchable PDF</h2>
      </div>
      <iframe id="pdfView" title="Searchable PDF preview"></iframe>
      <a class="dl" id="dlLink" href="#" download>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
        Download searchable PDF
      </a>
    </div>
  </div>
</div>

<script>
let f = null;
const $ = id => document.getElementById(id);
const drop = $('drop'), fileInput = $('file');

function fmtSize(b){
  if(b < 1024) return b + ' B';
  if(b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
function setFile(file){
  if(!file) return;
  if(file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')){
    showError('Please choose a PDF file.'); return;
  }
  f = file;
  $('fname').textContent = file.name;
  $('fsize').textContent = fmtSize(file.size);
  $('filebar').classList.add('show');
  $('go').disabled = false;
  $('err').classList.remove('show');
}
function clearFile(){
  f = null; fileInput.value = '';
  $('filebar').classList.remove('show');
  $('go').disabled = true;
}
function showError(msg){
  $('errmsg').textContent = msg;
  $('err').classList.add('show');
}

fileInput.addEventListener('change', e => setFile(e.target.files[0]));
$('clear').addEventListener('click', e => { e.preventDefault(); clearFile(); });
$('go').addEventListener('click', process);

['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('drag'); }));
['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('drag'); }));
drop.addEventListener('drop', e => setFile(e.dataTransfer.files[0]));

function fmtTime(sec){
  if(sec < 60) return sec.toFixed(1) + 's';
  const m = Math.floor(sec/60), s = Math.round(sec%60);
  return m + 'm ' + String(s).padStart(2,'0') + 's';
}

/* ---- Activity log ---- */
let logN = 0;
function resetLog(){
  logN = 0;
  $('logbody').innerHTML = '';
  $('logcount').textContent = '0';
  $('logdot').style.background = 'var(--ok)';
  $('logwrap').classList.add('show');
  $('logwrap').classList.remove('collapsed');
}
function logRow(msg, level='info', elapsed){
  const row = document.createElement('div');
  row.className = 'logrow' + (level && level !== 'info' ? ' ' + level : '');
  const t = document.createElement('span'); t.className = 'lt';
  t.textContent = (typeof elapsed === 'number' ? fmtTime(elapsed) : '').padStart(6, ' ');
  const m = document.createElement('span'); m.className = 'lm'; m.textContent = msg;
  row.append(t, m);
  const body = $('logbody');
  body.appendChild(row);
  body.scrollTop = body.scrollHeight;
  $('logcount').textContent = ++logN;
  if(level === 'error') $('logdot').style.background = 'var(--err)';
}
$('loghead').addEventListener('click', () => $('logwrap').classList.toggle('collapsed'));

/* ---- Incremental OCR text rendering ---- */
let lineTotal = 0, pageTotal = 0;
function resetResult(){
  $('ocrText').innerHTML = '';
  lineTotal = 0; pageTotal = 0;
  $('pageCount').textContent = '';
  $('pdfView').removeAttribute('src');
  $('dlLink').removeAttribute('href');
  $('result').classList.add('show');
}
function appendPage(p){
  pageTotal++;
  const box = $('ocrText');
  const block = document.createElement('div');
  block.className = 'page-block';
  const label = document.createElement('div');
  label.className = 'page-label';
  label.textContent = 'Page ' + p.page;
  block.appendChild(label);
  if(!p.lines || !p.lines.length){
    const e = document.createElement('div');
    e.className = 'empty'; e.textContent = 'No text detected on this page';
    block.appendChild(e);
  } else {
    p.lines.forEach(x => {
      lineTotal++;
      const ln = document.createElement('div');
      ln.className = 'line';
      ln.textContent = x.text;
      block.appendChild(ln);
    });
  }
  box.appendChild(block);
  box.scrollTop = box.scrollHeight;
  updateCount();
}
function updateCount(elapsed){
  const t = (typeof elapsed === 'number') ? ' · ' + fmtTime(elapsed) : '';
  $('pageCount').textContent = pageTotal + ' page' + (pageTotal!==1?'s':'') +
    ' · ' + lineTotal + ' line' + (lineTotal!==1?'s':'') + t;
}
function finishResult(d){
  updateCount(d.elapsed);
  $('pdfView').src = d.pdf_url;
  $('dlLink').href = d.pdf_url;
}

async function process(){
  if(!f) return;
  $('status').classList.add('show');
  $('result').classList.remove('show');
  $('err').classList.remove('show');
  $('go').disabled = true;
  resetLog();

  const bar = $('bar'), fill = $('barfill'), statMsg = $('statMsg'), statTime = $('statTime');
  fill.style.width = '0'; bar.classList.add('indet');
  statMsg.textContent = 'Uploading…';

  // live elapsed timer (client-side, smooth)
  const start = Date.now();
  const timer = setInterval(() => { statTime.textContent = fmtTime((Date.now()-start)/1000); }, 100);

  const fd = new FormData();
  fd.append('file', f);
  try{
    const res = await fetch('/process', { method:'POST', body: fd });
    if(!res.ok) throw new Error(await res.text() || ('Request failed (' + res.status + ')'));

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '', result = null;
    while(true){
      const { done, value } = await reader.read();
      if(done) break;
      buf += decoder.decode(value, { stream:true });
      let nl;
      while((nl = buf.indexOf('\n')) >= 0){
        const line = buf.slice(0, nl).trim();
        buf = buf.slice(nl+1);
        if(!line) continue;
        const msg = JSON.parse(line);
        if(msg.type === 'log'){
          logRow(msg.message, msg.level, msg.elapsed);
        } else if(msg.type === 'start'){
          bar.classList.remove('indet');
          statMsg.textContent = 'Processing ' + msg.total + ' page' + (msg.total!==1?'s':'') + '…';
          resetResult();  // reveal the text panel so OCR streams in live
        } else if(msg.type === 'page'){
          bar.classList.remove('indet');
          fill.style.width = Math.round(msg.page / msg.total * 100) + '%';
          statMsg.textContent = 'OCR · page ' + msg.page + ' of ' + msg.total;
          appendPage(msg);  // show this page's text immediately
        } else if(msg.type === 'status'){
          bar.classList.add('indet');
          statMsg.textContent = (msg.message || 'Working') + '…';
        } else if(msg.type === 'done'){
          result = msg;
        } else if(msg.type === 'error'){
          if(msg.trace) logRow(msg.trace, 'error', msg.elapsed);
          throw new Error(msg.message);
        }
      }
    }
    if(!result) throw new Error('No result received from server.');
    fill.style.width = '100%';
    finishResult(result);
    logRow('Done · ' + fmtTime(result.elapsed), 'done', result.elapsed);
    $('result').scrollIntoView({ behavior:'smooth', block:'start' });
  }catch(e){
    showError('Error: ' + e.message);
    logRow('Error: ' + e.message, 'error');
  }finally{
    clearInterval(timer);
    $('status').classList.remove('show');
    $('go').disabled = false;
  }
}
</script>
</body>
</html>
